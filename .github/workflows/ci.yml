name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # version comes from packageManager in package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check and build
        run: pnpm turbo run typecheck build

      - name: Verify shipped CSS completeness
        # The shipped stylesheet is a closed set: a utility absent here renders
        # unstyled for consumers. Assert core emitted the key utilities and that
        # every framework package ships a byte-identical copy of core's sheet.
        run: |
          for cls in bg-primary animate-spin size-4 text-primary-foreground; do
            grep -q "$cls" packages/core/dist/styles.css \
              || { echo "::error::'$cls' missing from @dartilesm/core dist/styles.css"; exit 1; }
          done
          diff -q packages/core/dist/styles.css packages/react/dist/styles.css
          diff -q packages/core/dist/styles.css packages/vue/dist/styles.css
          diff -q packages/core/dist/styles.css packages/svelte/dist/styles.css

      - name: Build Storybook
        run: pnpm turbo run build-storybook
